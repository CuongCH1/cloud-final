name: CICD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"


jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: uv pip install --system black

      - name: Check formatting with Black
        run: black --check .

  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Setup SSH key and connect
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.AWS_EC2_HOST }}
          SSH_USER: ${{ secrets.AWS_EC2_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          
          printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" 

          cd cloud-final

          echo "Pulling latest code..."
          git pull origin main

          echo "Rebuilding image..."
          docker build -t cloud-final-fastapi:latest .

          echo "Rebuilding container..."
          docker compose down
          docker container prune -f
          docker compose up -d

          echo "Cleaning unused image..."
          docker image prune -f
